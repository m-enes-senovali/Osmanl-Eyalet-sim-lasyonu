name: Windows EXE Build & Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release etiketi (örn. v1.1.1)'
        required: false
        default: 'v1.1.1'
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Kodlari Cek
        uses: actions/checkout@v4

      - name: Python 3.11 Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Release Etiketini Belirle
        id: release_tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: config.py Surum Numarasini Guncelle
        shell: python
        run: |
          import re, pathlib, sys
          config_path = pathlib.Path("config.py")
          content = config_path.read_text(encoding="utf-8")
          new_version = "${{ steps.release_tag.outputs.tag }}"
          updated = re.sub(r'^VERSION\s*=\s*["\'][^"\']*["\']', f'VERSION = "{new_version}"', content, flags=re.MULTILINE)
          if updated == content:
              print("HATA: config.py icinde VERSION satiri bulunamadi veya degistirilemedi!", file=sys.stderr)
              sys.exit(1)
          config_path.write_text(updated, encoding="utf-8")
          print(f"VERSION guncellendi: {new_version}")

      - name: Gereksinimleri Yukle
        run: pip install -r requirements.txt pyinstaller

      - name: secured_keys.json Olustur
        shell: python
        env:
          GITHUB_TOKEN_ENCRYPTED: ${{ secrets.GITHUB_TOKEN_ENCRYPTED }}
          EMAIL_ADDRESS_ENCRYPTED: ${{ secrets.EMAIL_ADDRESS_ENCRYPTED }}
          EMAIL_PASS_ENCRYPTED: ${{ secrets.EMAIL_PASS_ENCRYPTED }}
          SMTP_SERVER_ENCRYPTED: ${{ secrets.SMTP_SERVER_ENCRYPTED }}
          SMTP_PORT_ENCRYPTED: ${{ secrets.SMTP_PORT_ENCRYPTED }}
        run: |
          import json, os
          keys = {
              "github_token_encrypted":  os.environ.get("GITHUB_TOKEN_ENCRYPTED", ""),
              "email_address_encrypted": os.environ.get("EMAIL_ADDRESS_ENCRYPTED", ""),
              "email_pass_encrypted":    os.environ.get("EMAIL_PASS_ENCRYPTED", ""),
              "smtp_server_encrypted":   os.environ.get("SMTP_SERVER_ENCRYPTED", ""),
              "smtp_port_encrypted":     os.environ.get("SMTP_PORT_ENCRYPTED", ""),
          }
          # Bos deger tasiyan anahtarlari kaldir
          keys = {k: v for k, v in keys.items() if v}
          with open("secured_keys.json", "w", encoding="utf-8") as f:
              json.dump(keys, f)
          print(f"secured_keys.json olusturuldu. Anahtar sayisi: {len(keys)}")

      - name: EXE Olustur
        run: |
          pyinstaller --onefile --noconsole --name OsmanliEyaletSimulasyonu `
            --add-data "audio/sounds;audio/sounds" `
            --add-data "secured_keys.json;." `
            --collect-all pygame `
            --collect-all accessible_output2 `
            --collect-all requests `
            --hidden-import accessible_output2.outputs.auto `
            --hidden-import accessible_output2.outputs.nvda `
            --hidden-import accessible_output2.outputs.sapi5 `
            --hidden-import requests `
            --hidden-import urllib3 `
            --hidden-import charset_normalizer `
            --hidden-import certifi `
            --hidden-import idna `
            main.py

      - name: GitHub Release Olustur ve EXE Yukle
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: "Osmanlı Eyalet Simülasyonu ${{ steps.release_tag.outputs.tag }}"
          body: |
            ## Osmanlı Eyalet Simülasyonu ${{ steps.release_tag.outputs.tag }}

            ### Kurulum
            1. `OsmanliEyaletSimulasyonu.exe` dosyasını indirin.
            2. Çift tıklayarak çalıştırın — ek kurulum gerekmez.

            ### Gereksinimler
            - Windows 10 / 11 (64-bit)
          files: dist/OsmanliEyaletSimulasyonu.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
